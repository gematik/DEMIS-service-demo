spring:
    # Import Base Configuration
    config:
        import: classpath:/base-config-application.yaml
    # Enable Spring Virtual Threads
    threads:
        virtual:
            enabled: true
# Set Base Properties
base:
    errorhandler:
        enabled: false
    feign:
        extension:
            enabled: false
    logging:
        request:
            enabled: true
    meter:
        aspect:
            enabled: true
## Actuator Configuration
management:
    # Enable Exposing of Information over /actuator/info
    info:
        env:
            enabled: true
    observations:
        key-values:
            application: '@project.name@'
    health:
        livenessState:
            enabled: true
        readinessState:
            enabled: true
# Information for the /info Endpoint
info:
    app:
        name: '@project.name@'
        version: '@project.version@'
    